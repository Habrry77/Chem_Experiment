<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化学实验基础学习系统</title>
    <style>
        /* 核心样式：确保footer固定在底部 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%; /* 让页面高度占满视口 */
        }

        body {
            display: flex;
            flex-direction: column; /* 垂直排列内容 */
        }

        main {
            flex: 1; /* 让main占满除header和footer外的所有空间 */
            padding: 20px;
        }

        /* 基础样式美化 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative; /* 为返回按钮定位做准备 */
        }

        /* 返回按钮样式 */
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 16px;
            font-size: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #2980b9;
        }

        .module {
            margin: 20px 0;
        }

        .module-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #34495e;
            text-align: center;
        }

        /* 核心修改：卡片容器实现完全平均布局 */
        .game-container {
            display: flex;
            gap: 20px; /* 卡片之间的固定间距 */
            width: 100%;
            max-width: 1400px; /* 最大宽度 */
            margin: 0 auto; /* 整体居中 */
            flex-wrap: wrap; /* 小屏幕换行 */
            justify-content: center; /* 水平居中，核心：让卡片无论数量多少都居中平均分布 */
            align-items: stretch; /* 让卡片高度一致 */
        }

        /* 核心修改：卡片宽度适配，保证平均分布 */
        .game-card {
            border: 1px solid #ddd;
            padding: 30px 20px;
            border-radius: 8px;
            /* 关键：根据设计需求设置基础宽度，同时用flex-grow保证平均分配剩余空间 */
            flex: 1 1 calc(50% - 20px); /* 基础宽度50%减去间距，同时允许伸缩 */
            min-width: 280px; /* 最小宽度，保证小屏幕体验 */
            max-width: calc(50% - 10px); /* 最大宽度，限制2个卡片时的宽度 */
            text-align: center;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 卡片内元素样式 */
        .game-image {
            margin-bottom: 20px;
            height: 180px;
            background-color: #e9ecef;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .game-card h4 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .game-card p {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 兼容按钮和超链接样式 */
        .play-btn, .card-link {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none; /* 去掉超链接下划线 */
            display: inline-block; /* 保证padding生效 */
            width: 100%; /* 按钮宽度铺满卡片 */
        }

        .play-btn:hover, .card-link:hover {
            background-color: #2980b9;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
        }

        /* 响应式适配：保证不同屏幕下均平均布局 */
        @media (max-width: 768px) {
            .game-card {
                flex: 1 1 100%; /* 小屏幕1列，宽度100% */
                max-width: 100%;
                margin-bottom: 20px;
            }
            .back-btn {
                position: static; /* 小屏幕取消绝对定位 */
                transform: none;
                margin-bottom: 10px;
                display: inline-block;
            }
            .header {
                padding: 15px;
            }
        }

        /* 补充：如果后续扩展4个卡片，添加这个样式即可保持平均 */
        @media (min-width: 1200px) {
            .game-card {
                flex: 1 1 calc(25% - 15px); /* 4个卡片时平均分配 */
                max-width: calc(25% - 15px);
            }
        }
    </style>
</head>
<body>
    <!-- 顶部区域：包含返回按钮 -->
    <header class="header">
        <!-- 返回按钮：点击跳转到菜单页 -->
        <button class="back-btn" onclick="window.location.href='../chem_basics.html'">返回</button>
        <h1 class="main-title">高中化学实验基础学习系统</h1>
        <p class="subtitle">掌握化学实验基本操作，提升科学探究能力</p>
    </header>

    <!-- 主内容区域 -->
    <main>
        <section class="module" id="interactive-module">
            <h2 class="module-title">物质的检验、鉴别和推断</h2>
            <div class="module-content">
                <div class="game-container">
                    <div class="game-card">
                        <div class="game-image">
                            <img src="../../../images/biaoqian/Fe3.png" alt="实验模拟">
                        </div>
                        <h4>常见离子的检验</h4>
                        <p> </p>
                        <!-- 超链接1：仪器识别学习页 -->
                        <a href="ion.html" class="card-link">开始学习</a>
                    </div>
                    <div class="game-card">
                        <div class="game-image">
                            <img src="../../../images/biaoqian/ideNH3.png" alt="仪器识别">
                        </div>
                        <h4>常见气体的检验</h4>
                        <p> </p>
                        <!-- 超链接2：基本操作学习页 -->
                        <a href="gas.html" class="card-link">开始学习</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部区域 -->
    <footer class="footer">
        <p>© 2026 高中化学实验基础学习系统 - 版权所有</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
