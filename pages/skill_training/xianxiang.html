<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化学实验基础学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            position: relative;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4285f4;
        }
        .back-btn {
            position: absolute;
            left: 0;
            top: 0;
            padding: 8px 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .back-btn:hover {
            background-color: #3367d6;
        }
        h1 {
            font-size: 24px;
            margin-top: 10px;
        }
        #score-board {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            font-size: 18px;
        }
        #score-board span {
            font-weight: bold;
            color: #4285f4;
        }
        #question-area {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .question-box {
            font-size: 20px;
            margin-bottom: 25px;
            padding: 15px;
            border-left: 4px solid #4285f4;
            background: #f8f9fa;
            min-height: 80px;
            display: flex;
            align-items: center;
        }
        #answer-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .answer-btn {
            flex: 1;
            padding: 15px 0;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .correct-btn {
            background-color: #34a853;
            color: white;
        }
        .wrong-btn {
            background-color: #ea4335;
            color: white;
        }
        .feedback {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 16px;
        }
        .feedback.correct {
            display: block;
            background: #e6f4ea;
            color: #2d8d46;
            border: 1px solid #34a853;
        }
        .feedback.wrong {
            display: block;
            background: #fce8e6;
            color: #d93025;
            border: 1px solid #ea4335;
        }
        .next-btn {
            width: 100%;
            padding: 12px 0;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        #result-screen {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #restart-btn {
            padding: 12px 30px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }
        .answer-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width:600px) {
            #answer-buttons {flex-direction:column;gap:10px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="back-btn" onclick="window.location.href='skill_training.html'">返回首页</button>
            <h1>实验操作-现象-结论正误判断</h1>
        </header>

        <main>
            <div id="game-container">
                <div id="score-board">
                    <div>得分: <span id="score">0</span></div>
                    <div>剩余题目: <span id="remaining">20</span></div>
                </div>

                <div id="question-area">
                    <div id="question-text" class="question-box"></div>
                    <div id="answer-buttons">
                        <button id="btn-correct" class="answer-btn correct-btn">√ 正确</button>
                        <button id="btn-wrong" class="answer-btn wrong-btn">× 错误</button>
                    </div>
                    <div id="feedback" class="feedback"></div>
                    <button id="next-btn" class="next-btn" style="display:none;">下一题 →</button>
                </div>
            </div>

            <div id="result-screen" style="display:none;">
                <h2>答题完成！</h2>
                <p id="result-message"></p>
                <button id="restart-btn">重新开始</button>
            </div>
        </main>
    </div>

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
const totalQuestions = 20;

const scoreEl = document.getElementById("score");
const remainEl = document.getElementById("remaining");
const qTextEl = document.getElementById("question-text");
const btnRight = document.getElementById("btn-correct");
const btnWrong = document.getElementById("btn-wrong");
const feedbackEl = document.getElementById("feedback");
const nextBtn = document.getElementById("next-btn");
const resultScreen = document.getElementById("result-screen");
const restartBtn = document.getElementById("restart-btn");

function initGame() {
    currentIndex = 0;
    score = 0;
    scoreEl.textContent = score;
    remainEl.textContent = totalQuestions;
    currentQuestions = [...questionBank].sort(()=>Math.random()-0.5).slice(0,totalQuestions);
    resultScreen.style.display = "none";
    document.getElementById("game-container").style.display = "block";
    loadQuestion(0);
}

function loadQuestion(index) {
    if(index >= currentQuestions.length){
        showResult();
        return;
    }
    const q = currentQuestions[index];
    qTextEl.textContent = q.text;
    feedbackEl.className = "feedback";
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";
    btnRight.disabled = false;
    btnWrong.disabled = false;
}

function checkAnswer(userAns) {
    const q = currentQuestions[currentIndex];
    btnRight.disabled = true;
    btnWrong.disabled = true;
    if(userAns === q.answer){
        score++;
        scoreEl.textContent = score;
        feedbackEl.textContent = "✅ 回答正确！";
        feedbackEl.className = "feedback correct";
    } else {
        feedbackEl.textContent = "❌ 错误！解析：" + q.analysis;
        feedbackEl.className = "feedback wrong";
    }
    remainEl.textContent = totalQuestions - currentIndex - 1;
    nextBtn.style.display = "block";
}

function showResult() {
    document.getElementById("game-container").style.display = "none";
    resultScreen.style.display = "block";
    const rate = ((score/totalQuestions)*100).toFixed(1);
    document.getElementById("result-message").textContent = 
        `共30题，答对${score}题，正确率${rate}%`;
}

btnRight.addEventListener("click",()=>checkAnswer(true));
btnWrong.addEventListener("click",()=>checkAnswer(false));
nextBtn.addEventListener("click",()=>{
    currentIndex++;
    loadQuestion(currentIndex);
});
restartBtn.addEventListener("click",initGame);
document.addEventListener("keydown",(e)=>{
    if(e.key === "Enter" && nextBtn.style.display === "block"){
        currentIndex++;
        loadQuestion(currentIndex);
    }
});

window.onload = initGame;
</script>
