<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化学实验基础学习系统</title>
    <style>
        /* 核心样式：确保footer固定在底部 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%; /* 让页面高度占满视口 */
        }

        body {
            display: flex;
            flex-direction: column; /* 垂直排列内容 */
        }

        main {
            flex: 1; /* 让main占满除header和footer外的所有空间 */
            padding: 20px;
        }

        /* 基础样式美化 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative; /* 为返回按钮定位做准备 */
        }

        /* 返回按钮样式 */
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 16px;
            font-size: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #2980b9;
        }

        .module {
            margin: 20px 0;
        }

        .module-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #34495e;
            text-align: center;
        }

        /* 4个卡片均分布局 */
        .game-container {
            display: flex;
            gap: 20px; /* 卡片之间的间距 */
            width: 100%;
            max-width: 1400px; /* 放宽最大宽度，适配4个卡片 */
            margin: 0 auto 30px; /* 居中显示，与下方大卡片留出间距 */
            flex-wrap: wrap; /* 小屏幕自动换行 */
        }

        .game-card {
            border: 1px solid #ddd;
            padding: 30px 20px;
            border-radius: 8px;
            width: calc(25% - 15px); /* 4个卡片平均分配宽度，减去间距 */
            text-align: center;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 新增两倍宽度卡片容器 */
        .large-card-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* 两倍宽度卡片样式 */
        .large-game-card {
            border: 1px solid #ddd;
            padding: 30px 20px;
            border-radius: 8px;
            width: calc(50% - 10px); /* 两倍于原有卡片（原有25% → 50%） */
            text-align: center;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 卡片内元素样式 */
        .game-image {
            margin-bottom: 20px;
            height: 180px;
            background-color: #e9ecef;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 两倍卡片的图片高度适配 */
        .large-game-card .game-image {
            height: 220px; /* 略增高，适配宽卡片视觉比例 */
        }

        .game-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .game-card h4, .large-game-card h4 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .game-card p, .large-game-card p {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 兼容按钮和超链接样式 */
        .play-btn, .card-link {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none; /* 去掉超链接下划线 */
            display: inline-block; /* 保证padding生效 */
        }

        .play-btn:hover, .card-link:hover {
            background-color: #2980b9;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
        }

        /* 响应式适配 */
        @media (max-width: 1200px) {
            .game-card {
                width: calc(50% - 10px); /* 中等屏幕显示2列 */
            }
            .large-game-card {
                width: 100%; /* 中等屏幕下大卡片占满宽度 */
                margin-bottom: 20px;
            }
        }

        @media (max-width: 768px) {
            .game-card, .large-game-card {
                width: 100%; /* 小屏幕显示1列 */
                margin-bottom: 20px;
            }
            .back-btn {
                position: static; /* 小屏幕取消绝对定位 */
                transform: none;
                margin-bottom: 10px;
            }
            .header {
                padding: 15px;
            }
            /* 小屏幕下统一图片高度 */
            .game-image, .large-game-card .game-image {
                height: 180px;
            }
        }
    </style>
</head>
