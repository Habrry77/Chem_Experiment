<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化学实验基础学习系统</title>
    <style>
        /* 核心样式：确保footer固定在底部 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%; /* 让页面高度占满视口 */
        }

        body {
            display: flex;
            flex-direction: column; /* 垂直排列内容 */
        }

        main {
            flex: 1; /* 让main占满除header和footer外的所有空间 */
            padding: 20px;
        }

        /* 基础样式美化 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .module {
            margin: 20px 0;
        }

        .module-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #34495e;
            text-align: center;
        }

        /* 关键修改：让两个卡片各占1/2宽度 */
        .game-container {
            display: flex;
            gap: 20px; /* 卡片之间的间距 */
            width: 100%;
            max-width: 1200px; /* 限制最大宽度，避免大屏拉伸 */
            margin: 0 auto; /* 居中显示 */
        }

        .game-card {
            border: 1px solid #ddd;
            padding: 30px 20px; /* 增加内边距，放大卡片 */
            border-radius: 8px;
            width: 50%; /* 核心：每个卡片占容器1/2宽度 */
            text-align: center;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); /* 增加阴影，更突出 */
        }

        /* 放大卡片内的元素 */
        .game-image {
            margin-bottom: 20px;
            height: 180px; /* 固定图片容器高度，视觉更统一 */
            background-color: #e9ecef; /* 占位背景色，替换图片后可删除 */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .game-card h4 {
            font-size: 20px; /* 放大标题字体 */
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .game-card p {
            font-size: 16px; /* 放大描述字体 */
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 按钮样式优化：兼容a标签 */
        .play-btn, .card-link {
            padding: 12px 24px; /* 放大按钮 */
            font-size: 16px; /* 放大按钮文字 */
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none; /* 去掉a标签下划线 */
            display: inline-block; /* 保证padding生效 */
        }

        .play-btn:hover, .card-link:hover {
            background-color: #2980b9;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%; /* 确保宽度占满 */
        }

        /* 适配小屏幕：屏幕宽度小于768px时卡片堆叠 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            .game-card {
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部区域 -->
    <header class="header">
        <h1 class="main-title">高中化学实验基础学习系统</h1>
        <p class="subtitle">掌握化学实验基本操作，提升科学探究能力</p>
    </header>

    <!-- 主内容区域 -->
    <main>
        <!-- 第二个模块： -->
        <section class="module" id="interactive-module">
            <h2 class="module-title">交互式化学实验基本能力训练</h2>
            <div class="module-content">游戏化训练，科学化成长——精准提升实验核心能力
                <div class="game-container">
                    <div class="game-card">
                        <div class="game-image">
                            <img src="图片" alt="化学实验基础">
                        </div>
                        <h4>高中化学实验基础知识梳理</h4>
                        <p>夯实实验基础，筑牢化学根基</p>
                        <a href="pages/chem_basics/chem_basics.html" class="card-link">开始练习</a>
                    </div>
                    <div class="game-card">
                        <div class="game-image">
                            <img src="图片" alt="实验技能训练">
                        </div>
                        <h4>交互式化学实验基本能力训练</h4>
                        <p>游戏化训练，科学化成长——精准提升实验核心能力</p>
                        <a href="pages/skill_training/skill_training.html" class="card-link">开始挑战</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部区域 -->
    <footer class="footer">
        <p>© 2026 高中化学实验基础学习系统 - 版权所有</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
