<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中化学实验基础学习系统</title>
    <style>
        /* 核心样式：确保footer固定在底部 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%; /* 让页面高度占满视口 */
        }

        body {
            display: flex;
            flex-direction: column; /* 垂直排列内容 */
            /* 给固定按钮留出空间，避免遮挡 */
            padding-bottom: 120px;
        }

        main {
            flex: 1; /* 让main占满除header和footer外的所有空间 */
            padding: 20px;
        }

        /* 基础样式美化 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .module {
            margin: 20px 0;
        }

        .module-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #34495e;
            text-align: center;
        }

        /* 关键修改：让两个卡片各占1/2宽度 */
        .game-container {
            display: flex;
            gap: 20px; /* 卡片之间的间距 */
            width: 100%;
            max-width: 1200px; /* 限制最大宽度，避免大屏拉伸 */
            margin: 0 auto; /* 居中显示 */
        }

        .game-card {
            border: 1px solid #ddd;
            padding: 30px 20px; /* 增加内边距，放大卡片 */
            border-radius: 8px;
            width: 50%; /* 核心：每个卡片占容器1/2宽度 */
            text-align: center;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); /* 增加阴影，更突出 */
        }

        /* 核心修改：图片容器固定宽高比 + 图片充满容器且保持比例 */
        .game-image {
            margin-bottom: 20px;
            /* 固定宽高比：这里设置为 16:9（可根据需求修改，比如 4:3 则 padding-top: 75%） */
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例 = 9/16 = 56.25% */
            position: relative; /* 让图片绝对定位 */
            background-color: #e9ecef; /* 占位背景色，替换图片后可删除 */
            border-radius: 4px;
            overflow: hidden; /* 隐藏超出容器的图片部分 */
        }

        .game-image img {
            /* 绝对定位充满容器 */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 核心属性：保持比例并充满容器（裁剪超出部分） */
            object-fit: cover;
            /* 可选：让图片居中显示（裁剪时保留中间部分） */
            object-position: center;
        }

        .game-card h4 {
            font-size: 20px; /* 放大标题字体 */
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .game-card p {
            font-size: 16px; /* 放大描述字体 */
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 按钮样式优化：兼容a标签 */
        .play-btn, .card-link {
            padding: 12px 24px; /* 放大按钮 */
            font-size: 16px; /* 放大按钮文字 */
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none; /* 去掉a标签下划线 */
            display: inline-block; /* 保证padding生效 */
        }

        .play-btn:hover, .card-link:hover {
            background-color: #2980b9;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%; /* 确保宽度占满 */
        }

        /* 适配小屏幕：屏幕宽度小于768px时卡片堆叠 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            .game-card {
                width: 100%;
                margin-bottom: 20px;
            }
        }

        /* 新用户奖励按钮样式 - 核心新增部分 */
        .reward-container {
            position: fixed; /* 固定在右下角，不随页面滚动 */
            bottom: 30px;    /* 距离底部30px */
            right: 30px;     /* 距离右侧30px */
            z-index: 9999;   /* 确保在最上层，不被其他元素遮挡 */
            text-align: center;
        }

        .reward-text {
            font-size: 18px;
            font-weight: bold;
            color: #e74c3c; /* 红色醒目 */
            margin-bottom: 8px;
            text-shadow: 0 0 2px #fff; /* 增加文字阴影，提升可读性 */
        }

        .reward-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(to right, #ff6b6b, #e74c3c); /* 渐变红色，更醒目 */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4); /* 红色阴影，增强视觉效果 */
            transition: all 0.3s ease;
            text-decoration: none; /* 去掉a标签下划线 */
            display: inline-block;
        }

        .reward-btn:hover {
            transform: scale(1.05); /* 鼠标悬浮放大，增加交互感 */
            box-shadow: 0 6px 16px rgba(231, 76, 60, 0.6);
            background: linear-gradient(to right, #ff5252, #c0392b);
        }

        /* 小屏幕适配奖励按钮 */
        @media (max-width: 768px) {
            .reward-text {
                font-size: 16px;
            }
            .reward-btn {
                padding: 12px 24px;
                font-size: 16px;
            }
            .reward-container {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部区域 -->
    <header class="header">
        <h1 class="main-title">高中化学实验基础学习系统</h1>
        <p class="subtitle">掌握化学实验基本操作，提升科学探究能力</p>
    </header>

    <!-- 主内容区域 -->
    <main>
        <!-- 第二个模块： -->
        <section class="module" id="interactive-module">
            <h2 class="module-title">化学</h2>
            <div class="module-content">
                <div class="game-container">
                    <div class="game-card">
                        <div class="game-image">
                            <img src="images/biaoqian/index1.png" alt="化学实验基础">
                        </div>
                        <h4>高中化学实验基础知识梳理</h4>
                        <p>夯实实验基础，筑牢化学根基</p>
                        <a href="pages/chem_basics/chem_basics.html" class="card-link">开始练习</a>
                    </div>
                    <div class="game-card">
                        <div class="game-image">
                            <img src="images/biaoqian/index2.png" alt="实验技能训练">
                        </div>
                        <h4>交互式化学实验基本能力训练</h4>
                        <p>游戏化训练，科学化成长——精准提升实验核心能力</p>
                        <a href="pages/skill_training/skill_training.html" class="card-link">开始挑战</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部区域 -->
    <footer class="footer">
        <p>© 2026 高中化学实验基础学习系统 - 版权所有</p>
    </footer>

    <!-- 新用户奖励按钮 - 核心新增部分 -->
    <div class="reward-container">
        <div class="reward-text">新用户使用奖励100元</div>
        <!-- 替换 href 中的链接为你要跳转的网页地址 -->
        <a href="https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click" class="reward-btn">点击领取</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
